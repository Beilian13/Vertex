<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex | Platform</title>
    <style>
        :root { --primary: #007BFF; --bg: #050505; --card: #111; --text: #eee; --border: #222; --sidebar-w: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; }

        /* SIDEBAR */
        #sidebar { width: var(--sidebar-w); height: 100vh; background: #080808; border-right: 1px solid var(--border); position: fixed; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 8px; cursor: pointer; color: #888; transition: 0.2s; display: flex; align-items: center; }
        .nav-item:hover, .nav-item.active { background: #151515; color: var(--primary); }
        .nav-item i { margin-right: 12px; }

        /* CONTENT */
        main { margin-left: var(--sidebar-w); flex-grow: 1; padding: 40px; display: none; }
        .view { display: none; }
        .view.active { display: block; }

        /* GRADES TABLE (EXCEL STYLE) */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #111; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background: #1a1a1a; color: var(--primary); }
        input.grade-input { width: 60px; background: transparent; border: none; color: gold; text-align: center; font-weight: bold; }

        /* FORUM & CHECKLIST */
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        .av2-banner { background: linear-gradient(90deg, #ff4444, #b82e2e); color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .thread { border-bottom: 1px solid #222; padding: 15px 0; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <h2 style="color:var(--primary); margin-bottom:30px;">VERTEX</h2>
        <div class="nav-item active" onclick="switchView('home')">🏠 Início</div>
        <div class="nav-item" onclick="switchView('grades')">📊 Notas (Excel)</div>
        <div class="nav-item" onclick="switchView('forum')">💬 Fórum</div>
        <div class="nav-item" style="margin-top:auto; color:#ff4444;" onclick="logout()">🚪 Sair</div>
    </nav>

    <main id="main-screen">
        <section id="view-home" class="view active">
            <div id="av2-check" class="av2-banner">
                <strong>⚠️ SEMANA DE AV2:</strong> Check-list de estudos ativo!
            </div>
            <h1>Mural de Atividades</h1>
            <div id="task-list"></div>
        </section>

        <section id="view-grades" class="view">
            <h1>Calculadora de Médias</h1>
            <p style="color:#666; margin-bottom:20px;">Insira suas notas para calcular o GPA automaticamente.</p>
            <table>
                <thead>
                    <tr>
                        <th>Matéria</th><th>AV1</th><th>AV2</th><th>Média</th><th>Status</th>
                    </tr>
                </thead>
                <tbody id="grades-body">
                    </tbody>
            </table>
        </section>

        <section id="view-forum" class="view">
            <h1>Fórum de Alunos</h1>
            <div class="card" style="margin-top:20px;">
                <input type="text" id="forum-title" placeholder="Título da dúvida">
                <textarea id="forum-content" style="width:100%; height:80px; background:#1a1a1a; color:white; border:1px solid #222; border-radius:8px; padding:10px; margin:10px 0;" placeholder="Explique sua dúvida ou compartilhe algo..."></textarea>
                <button onclick="postThread()">Postar no Fórum</button>
            </div>
            <div id="forum-list"></div>
        </section>
    </main>

    <div id="auth-container" style="width:100%; display:flex; justify-content:center; align-items:center; height:100vh;">
        <div class="box" style="width:350px; background:#111; padding:30px; border-radius:12px; border:1px solid #222;">
            <h2 id="auth-title">Vertex Login</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="auth()">Entrar</button>
        </div>
    </div>

    <script>
        const subjects = ["Matemática", "Português", "Física", "História", "Geografia", "Inglês"];

        window.onload = () => {
            const user = localStorage.getItem('v-user');
            if(user) showDashboard(JSON.parse(user));
            setupGrades();
            checkAV2();
        };

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            if(viewId === 'forum') loadForum();
        }

        function setupGrades() {
            const body = document.getElementById('grades-body');
            subjects.forEach(s => {
                body.innerHTML += `
                    <tr>
                        <td>${s}</td>
                        <td><input type="number" class="grade-input" oninput="calc(this)" placeholder="0"></td>
                        <td><input type="number" class="grade-input" oninput="calc(this)" placeholder="0"></td>
                        <td class="media">0.0</td>
                        <td class="status">-</td>
                    </tr>`;
            });
        }

        function calc(el) {
            const row = el.parentElement.parentElement;
            const n1 = parseFloat(row.cells[1].children[0].value) || 0;
            const n2 = parseFloat(row.cells[2].children[0].value) || 0;
            const media = (n1 + n2) / 2;
            row.cells[3].innerText = media.toFixed(1);
            row.cells[4].innerText = media >= 6 ? "✅ Aprovado" : "❌ Recuperação";
            row.cells[4].style.color = media >= 6 ? "#28a745" : "#ff4444";
        }

        function checkAV2() {
            // Logic to check if current date is AV2 week (Example: first week of April)
            const now = new Date();
            if(now.getMonth() === 3) { // April
                document.getElementById('av2-check').style.display = 'block';
            }
        }

        async function loadForum() {
            const res = await fetch('/api/forum');
            const threads = await res.json();
            const list = document.getElementById('forum-list');
            list.innerHTML = threads.map(t => `
                <div class="card thread">
                    <h4>${t.titulo}</h4>
                    <p style="color:#bbb; font-size:0.9rem; margin:10px 0;">${t.conteudo}</p>
                    <small style="color:var(--primary)">Por: ${t.autor} | ${t.turma}</small>
                </div>
            `).join('');
        }

        async function postThread() {
            const payload = {
                titulo: document.getElementById('forum-title').value,
                conteudo: document.getElementById('forum-content').value,
                token: localStorage.getItem('v-token')
            };
            await fetch('/api/forum', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            loadForum();
        }

        // AUTH LOGIC (Previous consolidated)
        async function auth() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('pass').value;
            const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, senha}) });
            if(res.ok) {
                const user = await res.json();
                localStorage.setItem('v-user', JSON.stringify(user));
                localStorage.setItem('v-token', user.token);
                showDashboard(user);
            }
        }

        function showDashboard(user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-screen').style.display = 'flex';
            loadTasks();
        }

        async function loadTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            document.getElementById('task-list').innerHTML = tasks.map(t => `<div class="card"><strong>${t.materia}</strong>: ${t.titulo}</div>`).join('');
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
