<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex | Gestão Acadêmica</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --accent: #00d2ff; --bg: #050505; --card: rgba(25, 25, 25, 0.7); --border: rgba(255, 255, 255, 0.08); --text: #f0f0f0; --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.2s ease-in-out; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* GLASSMISM CORE */
        .glass { background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; box-shadow: var(--shadow); }
        #auth-page { height: 100vh; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle at 20% 30%, #112244 0%, transparent 40%); }
        .auth-container { width: 420px; padding: 45px; text-align: center; }
        
        .btn-main { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); }

        input, textarea, select { width: 100%; padding: 14px; margin-top: 5px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px; color: #fff; }
        
        #app-shell { display: none; }
        #sidebar { width: 280px; height: 95vh; margin: 2.5vh; position: fixed; display: flex; flex-direction: column; padding: 30px; }
        .sidebar-brand { font-family: 'Poppins'; font-size: 1.8rem; color: var(--accent); margin-bottom: 50px; }
        
        .nav-item { padding: 16px; margin: 8px 0; border-radius: 14px; cursor: pointer; color: #999; display: flex; align-items: center; gap: 12px; }
        .nav-item.active { background: linear-gradient(90deg, rgba(0,210,255,0.15) 0%, transparent 100%); color: var(--accent); border-left: 3px solid var(--accent); }

        main { margin-left: 320px; padding: 40px; }
        .view { display: none; animation: slideUp 0.5s ease; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .branch { border-left: 2px solid #333; margin-left: 30px; padding-left: 20px; margin-top: 15px; }
        #notification { position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; border-radius: 12px; background: var(--accent); color: #000; font-weight: bold; transform: translateX(200%); transition: 0.5s; z-index: 1000; }
        #notification.show { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="notification">Ação concluída!</div>

    <section id="auth-page">
        <div class="auth-container glass">
            <h1 class="sidebar-brand">VERTEX</h1>
            <div id="reg-fields" style="display:none">
                <input type="text" id="reg-nome" placeholder="Nome Completo">
                <input type="text" id="reg-turma" placeholder="Turma (ex: 8A)">
            </div>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">
            <button class="btn-main" id="auth-btn" onclick="handleAuth()">Autenticar</button>
            <p onclick="toggleAuth()" style="margin-top:20px; font-size:0.8rem; cursor:pointer; color:var(--accent)">Trocar Modo</p>
        </div>
    </section>

    <div id="app-shell">
        <nav id="sidebar" class="glass">
            <div class="sidebar-brand">VERTEX</div>
            <div class="nav-item active" onclick="switchView('home')">Mural</div>
            <div class="nav-item" onclick="switchView('homeworks')">Lições</div>
            <div class="nav-item" onclick="switchView('grades')">Boletim</div>
            <div class="nav-item" onclick="switchView('forum')">Fórum</div>
            <div id="nav-direcao" class="nav-item" style="display:none; color:red" onclick="switchView('direcao')">🛡️ Direção</div>
            
            <div style="margin-top:auto; display:flex; align-items:center; gap:10px;">
                <img id="user-avatar" style="width:40px; border-radius:50%;">
                <div style="font-size:0.8rem">
                    <b id="user-name-label"></b><br>
                    <span id="user-role-label" style="color:#666"></span>
                </div>
            </div>
            <div class="nav-item" onclick="logout()" style="color:red">Sair</div>
        </nav>

        <main>
            <section id="view-home" class="view active">
                <div class="card-header"><h2>Mural da Turma</h2></div>
                <div id="prof-post-area" class="glass" style="display:none; padding:20px; margin-bottom:20px;">
                    <input type="text" id="m-tit" placeholder="Título do Comunicado">
                    <button class="btn-main" onclick="postToMural()" style="width:auto; margin-top:10px;">Postar</button>
                </div>
                <div id="mural-list" class="grid"></div>
            </section>

            <section id="view-homeworks" class="view">
                <div class="card-header">
                    <h2>Lições</h2>
                    <button id="btn-new-hw" class="btn-main" style="width:auto;" onclick="toggleHwForm()">+ Nova</button>
                </div>
                <div id="hw-form" class="glass" style="display:none; padding:20px; margin-bottom:20px;">
                    <input type="text" id="h-tit" placeholder="Título">
                    <input type="text" id="h-mat" placeholder="Matéria">
                    <textarea id="h-desc" placeholder="Descrição"></textarea>
                    <input type="date" id="h-date">
                    <button class="btn-main" onclick="postHomework()">Salvar</button>
                </div>
                <div id="hw-list" class="grid"></div>
            </section>

            <section id="view-grades" class="view">
                <div class="card-header">
                    <h2>Boletim</h2>
                    <button class="btn-main" style="width:auto;" onclick="generatePDF()">PDF</button>
                </div>
                <div id="pdf-content" class="glass"><table style="width:100%"><tbody id="grades-table-body"></tbody></table></div>
            </section>

            <section id="view-forum" class="view">
                <div id="forum-list-view">
                    <button class="btn-main" onclick="document.getElementById('forum-composer').style.display='block'">Novo Tópico</button>
                    <div id="forum-composer" class="glass" style="display:none; margin-top:20px;">
                        <input type="text" id="f-tit" placeholder="Título">
                        <textarea id="f-con" placeholder="Conteúdo"></textarea>
                        <button class="btn-main" onclick="postThread()">Postar</button>
                    </div>
                    <div id="forum-container" style="margin-top:20px;"></div>
                </div>
                <div id="thread-view" style="display:none">
                    <button onclick="closeThread()" style="color:var(--accent); cursor:pointer;">← Voltar</button>
                    <div id="thread-content" class="glass" style="margin-top:20px;"></div>
                    <div id="comment-tree"></div>
                    <textarea id="main-reply" placeholder="Comentar..."></textarea>
                    <button class="btn-main" onclick="postReply(null)">Enviar</button>
                </div>
            </section>
        </main>
    </div>

    <script>
    let isLogin = true, currentThread = null;

    // Improved API helper with Error Catching
    const api = async (url, method = 'GET', body = null) => {
        const token = localStorage.getItem('v-token');
        const opts = { 
            method, 
            headers: { 'Content-Type': 'application/json', 'Authorization': token || '' } 
        };
        if (body) opts.body = JSON.stringify(body);
        
        try {
            const res = await fetch(url, opts);
            const contentType = res.headers.get("content-type");
            
            // If server sends HTML instead of JSON (404/Wildcard error)
            if (contentType && !contentType.includes("application/json")) {
                console.error("Server returned non-JSON response. Check API routes.");
                return null;
            }

            if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
            return await res.json();
        } catch (e) {
            console.error("API Call Failed:", e);
            return null;
        }
    };

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        const target = document.getElementById('view-' + id);
        if (target) target.classList.add('active');

        if (id === 'home') loadMural();
        if (id === 'homeworks') loadHWs();
        if (id === 'forum') loadForum();
        if (id === 'grades') loadGrades();
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const body = isLogin ? { email, senha } : { 
            email, senha, 
            nome: document.getElementById('reg-nome').value, 
            turma: document.getElementById('reg-turma').value 
        };

        const res = await fetch(isLogin ? '/api/auth/login' : '/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        const data = await res.json();
        if (res.ok) {
            if (isLogin) {
                localStorage.setItem('v-token', data.token);
                localStorage.setItem('v-user', JSON.stringify(data));
                initApp(data);
            } else { alert("Sucesso! Faça Login."); toggleAuth(); }
        } else { alert(data.msg || "Erro na autenticação"); }
    }

    function initApp(u) {
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        document.getElementById('user-name-label').innerText = u.nome;
        if (u.role !== 'aluno') document.getElementById('prof-post-area').style.display = 'block';
        switchView('home');
    }

    async function loadMural() {
        const data = await api('/api/mural');
        if (!data) return;
        document.getElementById('mural-list').innerHTML = data.map(p => `
            <div class="glass" style="padding:15px; margin-bottom:10px;">
                <h4>${p.titulo}</h4><small>Por ${p.autor}</small>
            </div>`).join('');
    }

    async function postToMural() {
        const tit = document.getElementById('m-tit').value;
        if (!tit) return;
        await api('/api/mural', 'POST', { titulo: tit });
        document.getElementById('m-tit').value = '';
        loadMural();
    }

    async function loadHWs() {
        const data = await api('/api/homeworks');
        if (!data) return;
        document.getElementById('hw-list').innerHTML = data.map(h => `
            <div class="glass hw-card" style="padding:15px; margin-bottom:10px; border-left:4px solid var(--accent);">
                <b>${h.materia}</b>: ${h.titulo}<br>
                <small>Entrega: ${new Date(h.dataEntrega).toLocaleDateString()}</small>
            </div>`).join('');
    }

    async function postHomework() {
        const body = { 
            titulo: document.getElementById('h-tit').value,
            materia: document.getElementById('h-mat').value,
            descricao: document.getElementById('h-desc').value,
            dataEntrega: document.getElementById('h-date').value
        };
        await api('/api/homeworks', 'POST', body);
        loadHWs();
    }

    async function loadGrades() {
        const grades = await api('/api/me/grades');
        if (!grades) return;
        document.getElementById('grades-table-body').innerHTML = grades.map(g => `
            <tr>
                <td>${g.materia}</td>
                <td style="text-align:center">${g.av1}</td>
                <td style="text-align:center">${g.av2}</td>
                <td style="text-align:center; color:var(--accent)"><b>${((g.av1+g.av2)/2).toFixed(1)}</b></td>
            </tr>`).join('');
    }

    async function loadForum() {
        const data = await api('/api/forum');
        if (!data) return;
        document.getElementById('forum-container').innerHTML = data.map(t => `
            <div class="glass" style="padding:15px; margin-top:10px; cursor:pointer;" onclick="openThread('${t._id}')">
                ${t.titulo} <br><small>Por ${t.autor}</small>
            </div>`).join('');
    }

    async function openThread(id) {
        const t = await api(`/api/forum/${id}`);
        if (!t) return;
        currentThread = t;
        document.getElementById('forum-list-view').style.display = 'none';
        document.getElementById('thread-view').style.display = 'block';
        document.getElementById('thread-content').innerHTML = `<h3>${t.titulo}</h3><p>${t.conteudo}</p>`;
        renderComments(t.replies);
    }

    function renderComments(replies, parentId = null) {
        const container = parentId === null ? document.getElementById('comment-tree') : document.getElementById(`replies-${parentId}`);
        if (!container) return;
        if (parentId === null) container.innerHTML = '';

        const children = replies.filter(r => r.parentId === (parentId ? parentId.toString() : null));
        children.forEach(r => {
            const div = document.createElement('div');
            div.className = parentId === null ? 'glass reply-box' : 'branch';
            div.style.padding = "10px"; div.style.marginTop = "10px";
            div.innerHTML = `<small style="color:var(--accent)">${r.autor}</small><p>${r.texto}</p><div id="replies-${r.id}"></div>`;
            container.appendChild(div);
            if (r.id !== parentId) renderComments(replies, r.id);
        });
    }

    async function postReply(parentId) {
        const texto = document.getElementById('main-reply').value;
        if(!texto) return;
        await api('/api/forum/reply', 'POST', { threadId: currentThread._id, texto, parentId });
        openThread(currentThread._id);
        document.getElementById('main-reply').value = '';
    }

    window.onload = () => { 
        const u = localStorage.getItem('v-user'); 
        if (u) initApp(JSON.parse(u)); 
    };
</script>
</body>
</html>
