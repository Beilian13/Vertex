<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex | Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #000000; 
            --surface: #0a0c10; 
            --accent: #0070ff; 
            --accent-glow: rgba(0, 112, 255, 0.3);
            --border: #1a1d23;
            --text: #f0f2f5; 
            --text-dim: #8e95a2;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Outfit', sans-serif; margin: 0; padding-bottom: 80px; 
            overflow-x: hidden;
        }

        /* PREMIUM COMPONENTS */
        .glass { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .btn { 
            background: var(--accent); color: white; border: none; 
            padding: 14px 20px; border-radius: 12px; cursor: pointer; 
            font-weight: 600; width: 100%; transition: 0.2s;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .btn:active { transform: scale(0.97); opacity: 0.8; }

        input, textarea { 
            background: #0d1117; border: 1px solid var(--border); 
            color: #fff; padding: 16px; border-radius: 12px; 
            width: 100%; margin-bottom: 12px; font-size: 16px;
        }

        /* MOBILE NAVIGATION */
        nav { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10, 12, 16, 0.95); 
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; 
            padding: 15px 10px; border-top: 1px solid var(--border);
            z-index: 1000;
        }
        .nav-item { 
            text-align: center; color: var(--text-dim); font-size: 11px; 
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }
        .nav-item.active { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

        /* VIEWS */
        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { padding: 20px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .card { padding: 20px; margin-bottom: 15px; }
        .materia-badge { 
            display: inline-block; background: var(--accent-glow); 
            color: var(--accent); padding: 4px 10px; 
            border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 8px;
        }

        /* AUTH SCREEN */
        #auth-page { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; padding: 30px;
        }
        .logo { font-size: 32px; font-weight: 800; color: var(--accent); letter-spacing: -1px; text-align: center; margin-bottom: 40px; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="logo">VERTEX</div>
        <div class="glass card" style="border: none;">
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nome" placeholder="Nome Completo">
                <input type="text" id="reg-turma" placeholder="Turma (ex: 801)">
            </div>
            <input type="email" id="email" placeholder="Email institucional">
            <input type="password" id="senha" placeholder="Senha">
            <button class="btn" onclick="handleAuth()">Acessar Sistema</button>
            <p onclick="toggleAuth()" style="text-align:center; color:var(--text-dim); font-size:13px; margin-top:20px;">Alternar Login/Registro</p>
        </div>
    </div>

    <div id="app-shell" style="display:none;">
        <header>
            <div style="display:flex; align-items:center; gap:12px;">
                <img id="user-avatar" src="" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--accent);">
                <div>
                    <div id="user-name-label" style="font-weight:600; font-size:16px;"></div>
                    <div id="user-role-label" style="font-size:11px; color:var(--text-dim);"></div>
                </div>
            </div>
        </header>

        <div id="view-home" class="view active">
            <div id="prof-post-area" style="display:none; margin-bottom:25px;">
                <h4 style="margin: 0 0 10px 0;">Novo Aviso</h4>
                <input type="text" id="m-tit" placeholder="Digite seu comunicado...">
                <button class="btn" onclick="postToMural()">Publicar no Mural</button>
            </div>
            <h3 style="margin-bottom:20px;">Mural Digital</h3>
            <div id="mural-list"></div>
        </div>

        <div id="view-homeworks" class="view">
            <button class="btn" id="btn-new-hw" style="display:none; margin-bottom:20px;" onclick="toggleHwForm()">+ Nova Atividade</button>
            <div id="hw-form" class="glass card" style="display:none;">
                <input type="text" id="h-mat" placeholder="Matéria">
                <input type="text" id="h-tit" placeholder="Título">
                <textarea id="h-desc" placeholder="Descrição da tarefa"></textarea>
                <input type="date" id="h-date">
                <button class="btn" onclick="postHomework()">Lançar Atividade</button>
            </div>
            <div id="hw-list"></div>
        </div>

        <div id="view-grades" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0;">Boletim</h3>
                <button onclick="generatePDF()" style="background:none; border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-size:12px;">PDF</button>
            </div>
            <div id="grades-container"></div>
        </div>

        <div id="view-forum" class="view">
            <div id="forum-list-view">
                <div class="glass card">
                    <input type="text" id="f-tit" placeholder="Título da dúvida">
                    <textarea id="f-con" placeholder="Explique seu ponto..."></textarea>
                    <button class="btn" onclick="postThread()">Iniciar Discussão</button>
                </div>
                <div id="forum-container" style="margin-top:20px;"></div>
            </div>
            <div id="thread-view" style="display:none;">
                <span onclick="closeThread()" style="color:var(--accent); font-weight:600; cursor:pointer;">← Voltar</span>
                <div id="thread-content" style="margin:25px 0;"></div>
                <div id="comment-tree"></div>
                <div style="margin-top:30px;">
                    <textarea id="main-reply" placeholder="Sua resposta..."></textarea>
                    <button class="btn" onclick="postReply(null)">Enviar Resposta</button>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="switchView('home')">Mural</div>
            <div class="nav-item" onclick="switchView('homeworks')">Atividades</div>
            <div class="nav-item" onclick="switchView('grades')">Boletim</div>
            <div class="nav-item" onclick="switchView('forum')">Fórum</div>
            <div class="nav-item" onclick="logout()">Sair</div>
        </nav>
    </div>

    <script>
        let isLogin = true, currentThread = null;

        const api = async (url, method = 'GET', body = null) => {
            const token = localStorage.getItem('v-token');
            const opts = { 
                method, 
                headers: { 'Content-Type': 'application/json', 'Authorization': token || '' } 
            };
            if (body) opts.body = JSON.stringify(body);
            try {
                const res = await fetch(url, opts);
                if (res.status === 403) { alert("Permissão negada."); return null; }
                if (!res.ok) throw new Error();
                return await res.json();
            } catch (e) { return null; }
        };

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            
            // Find nav item by text content and highlight
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                if(item.innerText.toLowerCase().includes(id.replace('home','mural').replace('homeworks','atividades').toLowerCase())) {
                    item.classList.add('active');
                }
            });

            if (id === 'home') loadMural();
            if (id === 'homeworks') loadHWs();
            if (id === 'forum') loadForum();
            if (id === 'grades') loadGrades();
        }

        function toggleAuth() { 
            isLogin = !isLogin; 
            document.getElementById('reg-fields').style.display = isLogin ? 'none' : 'block'; 
        }

        async function handleAuth() {
            const body = { 
                email: document.getElementById('email').value, 
                senha: document.getElementById('senha').value,
                nome: document.getElementById('reg-nome').value,
                turma: document.getElementById('reg-turma').value
            };
            const res = await fetch(isLogin ? '/api/auth/login' : '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (res.ok) {
                if (isLogin) {
                    localStorage.setItem('v-token', data.token);
                    localStorage.setItem('v-user', JSON.stringify(data));
                    initApp(data);
                } else { alert("Registrado com sucesso!"); toggleAuth(); }
            } else alert("Erro: Verifique seus dados.");
        }

        function initApp(u) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('app-shell').style.display = 'block';
            document.getElementById('user-avatar').src = u.avatar;
            document.getElementById('user-name-label').innerText = u.nome;
            document.getElementById('user-role-label').innerText = u.role.toUpperCase() + " • " + (u.turma || "GERAL");
            if (u.role !== 'aluno') {
                document.getElementById('prof-post-area').style.display = 'block';
                document.getElementById('btn-new-hw').style.display = 'block';
            }
            switchView('home');
        }

        async function loadMural() {
            const data = await api('/api/mural');
            if (data) document.getElementById('mural-list').innerHTML = data.map(p => `
                <div class="glass card">
                    <div style="font-weight:600; margin-bottom:5px;">${p.titulo}</div>
                    <div style="color:var(--text-dim); font-size:12px;">${p.autor} • ${new Date(p.createdAt).toLocaleDateString()}</div>
                </div>`).join('');
        }

        async function postToMural() {
            const tit = document.getElementById('m-tit').value;
            if (await api('/api/mural', 'POST', { titulo: tit })) {
                document.getElementById('m-tit').value = '';
                loadMural();
            }
        }

        function toggleHwForm() {
            const f = document.getElementById('hw-form');
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
        }

        async function loadHWs() {
            const data = await api('/api/homeworks');
            if (data) document.getElementById('hw-list').innerHTML = data.map(h => `
                <div class="glass card" style="border-left: 4px solid var(--accent);">
                    <span class="materia-badge">${h.materia.toUpperCase()}</span>
                    <div style="font-weight:600; margin-bottom:8px;">${h.titulo}</div>
                    <div style="font-size:13px; color:var(--text-dim);">${h.descricao}</div>
                    <div style="margin-top:12px; font-size:11px; color:var(--accent);">ENTREGA: ${new Date(h.dataEntrega).toLocaleDateString()}</div>
                </div>`).join('');
        }

        async function postHomework() {
            const body = { 
                materia: document.getElementById('h-mat').value, 
                titulo: document.getElementById('h-tit').value,
                descricao: document.getElementById('h-desc').value,
                dataEntrega: document.getElementById('h-date').value
            };
            if (await api('/api/homeworks', 'POST', body)) { toggleHwForm(); loadHWs(); }
        }

        async function loadGrades() {
            const grades = await api('/api/me/grades');
            if (grades) document.getElementById('grades-container').innerHTML = grades.map(g => `
                <div class="glass card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:600;">${g.materia}</div>
                        <div style="font-size:12px; color:var(--text-dim);">AV1: ${g.av1} | AV2: ${g.av2}</div>
                    </div>
                    <div style="font-size:20px; font-weight:800; color:var(--accent);">${((g.av1+g.av2)/2).toFixed(1)}</div>
                </div>`).join('');
        }

        function generatePDF() { html2pdf().from(document.getElementById('view-grades')).save('Vertex_Boletim.pdf'); }

        async function loadForum() {
            const data = await api('/api/forum');
            if (data) document.getElementById('forum-container').innerHTML = data.map(t => `
                <div class="glass card" onclick="openThread('${t._id}')">
                    <div style="font-weight:600; margin-bottom:5px;">${t.titulo}</div>
                    <div style="color:var(--text-dim); font-size:12px;">${t.autor} • ${t.replies.length} respostas</div>
                </div>`).join('');
        }

        async function postThread() {
            const body = { titulo: document.getElementById('f-tit').value, conteudo: document.getElementById('f-con').value };
            if (await api('/api/forum', 'POST', body)) {
                document.getElementById('f-tit').value = '';
                document.getElementById('f-con').value = '';
                loadForum();
            }
        }

        async function openThread(id) {
            const t = await api(`/api/forum/${id}`);
            if (!t) return;
            currentThread = t;
            document.getElementById('forum-list-view').style.display = 'none';
            document.getElementById('thread-view').style.display = 'block';
            document.getElementById('thread-content').innerHTML = `
                <h2 style="margin:0 0 10px 0;">${t.titulo}</h2>
                <p style="color:var(--text-dim); line-height:1.6;">${t.conteudo}</p>
            `;
            renderComments(t.replies);
        }

        function renderComments(replies, parentId = null) {
            const container = parentId === null ? document.getElementById('comment-tree') : document.getElementById(`replies-${parentId}`);
            if (!container) return;
            if (parentId === null) container.innerHTML = '';
            replies.filter(r => r.parentId === (parentId ? parentId.toString() : null)).forEach(r => {
                const div = document.createElement('div');
                div.style.padding = '15px 0';
                div.style.borderLeft = parentId ? '1px solid var(--border)' : 'none';
                div.style.paddingLeft = parentId ? '15px' : '0';
                div.innerHTML = `
                    <div style="font-size:12px; font-weight:600; color:var(--accent); margin-bottom:4px;">${r.autor}</div>
                    <div style="font-size:14px; margin-bottom:10px;">${r.texto}</div>
                    <div id="replies-${r.id}"></div>
                `;
                container.appendChild(div);
                renderComments(replies, r.id);
            });
        }

        async function postReply(parentId) {
            const texto = document.getElementById('main-reply').value;
            if (await api('/api/forum/reply', 'POST', { threadId: currentThread._id, texto, parentId })) {
                document.getElementById('main-reply').value = '';
                openThread(currentThread._id);
            }
        }

        function closeThread() { document.getElementById('forum-list-view').style.display = 'block'; document.getElementById('thread-view').style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => { 
            const u = localStorage.getItem('v-user'); 
            if (u) initApp(JSON.parse(u)); 
        };
    </script>
</body>
</html>
