<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vertex | Gestão Total</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --accent: #00d2ff; --bg: #030303; --card: rgba(25, 25, 25, 0.8); --border: rgba(255, 255, 255, 0.1); --text: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        /* AUTH PAGE - VISIBLE BY DEFAULT */
        #auth-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #112244 0%, #030303 100%); }
        .glass-card { background: var(--card); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* DASHBOARD - HIDDEN BY DEFAULT */
        #app-shell { display: none; }
        #sidebar { width: 280px; height: 95vh; margin: 2.5vh; position: fixed; display: flex; flex-direction: column; padding: 30px; z-index: 100; }
        main { margin-left: 320px; padding: 40px; width: calc(100% - 320px); }

        .nav-link { padding: 15px; margin: 5px 0; border-radius: 12px; cursor: pointer; color: #888; transition: 0.3s; }
        .nav-link.active { background: rgba(0, 210, 255, 0.1); color: var(--accent); font-weight: bold; }

        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
        .btn-prime { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-prime:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .branch { border-left: 2px solid var(--accent); margin-left: 20px; padding-left: 15px; margin-top: 10px; }
        .hw-card { border-left: 4px solid #ffcc00; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="glass-card" style="width: 400px; text-align: center;">
            <h1 style="font-family:'Poppins'; color:var(--accent); font-size:2.5rem; margin-bottom:10px;">VERTEX</h1>
            <p style="color:#666; margin-bottom:30px;">Sistema de Gestão Escolar</p>
            <div id="reg-fields" style="display:none">
                <input type="text" id="reg-nome" placeholder="Nome Completo">
                <input type="text" id="reg-turma" placeholder="Sua Turma">
            </div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="senha" placeholder="Senha">
            <button class="btn-prime" onclick="handleAuth()" id="auth-btn">Entrar no Sistema</button>
            <p onclick="toggleAuth()" style="margin-top:20px; font-size:0.8rem; cursor:pointer; color:var(--accent)">Trocar para Registro</p>
        </div>
    </div>

    <div id="app-shell">
        <nav id="sidebar" class="glass-card">
            <h2 style="font-family:'Poppins'; color:var(--accent); margin-bottom:40px;">VERTEX</h2>
            <div class="nav-link active" onclick="switchView('home')">🏠 Mural</div>
            <div class="nav-link" onclick="switchView('homeworks')">📚 Lição de Casa</div>
            <div class="nav-link" onclick="switchView('grades')">📊 Boletim PDF</div>
            <div class="nav-link" onclick="switchView('forum')">💬 Fórum</div>
            <div id="btn-direcao" class="nav-link" style="display:none; color:#ff4b4b" onclick="switchView('direcao')">🛡️ Direção</div>
            <div class="nav-link" onclick="logout()" style="margin-top:auto; color:#ff4b4b">🚪 Sair</div>
        </nav>

        <main>
            <h2 id="welcome-header" style="margin-bottom:30px; font-family:'Poppins';">Bem-vindo</h2>

            <section id="view-home" class="view active">
                <div id="prof-mural" class="glass-card" style="display:none">
                    <h3>Novo Comunicado</h3>
                    <input type="text" id="m-tit" placeholder="Assunto">
                    <button class="btn-prime" onclick="postMural()">Enviar ao Mural</button>
                </div>
                <div id="mural-list"></div>
            </section>

            <section id="view-homeworks" class="view">
                <div id="prof-hw" class="glass-card" style="display:none; border-color:#ffcc00">
                    <h3>Nova Lição</h3>
                    <input type="text" id="h-tit" placeholder="Título da Tarefa">
                    <input type="text" id="h-mat" placeholder="Matéria">
                    <textarea id="h-desc" placeholder="Instruções..."></textarea>
                    <input type="date" id="h-date">
                    <button class="btn-prime" style="background:#ffcc00" onclick="postHW()">Publicar</button>
                </div>
                <div id="hw-list"></div>
            </section>

            <section id="view-direcao" class="view">
                <div class="glass-card">
                    <h3>Administração da Escola</h3>
                    <div id="user-list"></div>
                </div>
            </section>

            <section id="view-forum" class="view">
                <div id="forum-list-view">
                    <div class="glass-card">
                        <input type="text" id="f-tit" placeholder="Título do Debate">
                        <textarea id="f-con" placeholder="Mensagem..."></textarea>
                        <button class="btn-prime" onclick="postThread()">Abrir Tópico</button>
                    </div>
                    <div id="forum-container"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let isLogin = true;
        const token = () => localStorage.getItem('v-token');

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('reg-fields').style.display = isLogin ? 'none' : 'block';
            document.getElementById('auth-btn').innerText = isLogin ? 'Entrar no Sistema' : 'Criar Conta';
        }

        async function handleAuth() {
            const body = isLogin ? { email:email.value, senha:senha.value } : 
                         { nome:reg-nome.value, email:email.value, senha:senha.value, turma:reg-turma.value };
            
            const res = await fetch(isLogin ? '/api/auth/login' : '/api/auth/register', {
                method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
            });

            if(res.ok) {
                if(isLogin) {
                    const data = await res.json();
                    localStorage.setItem('v-token', data.token);
                    localStorage.setItem('v-user', JSON.stringify(data));
                    initApp(data);
                } else { alert("Registrado!"); toggleAuth(); }
            } else { alert("Falha na autenticação"); }
        }

        function initApp(user) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('app-shell').style.display = 'block';
            document.getElementById('welcome-header').innerText = `Olá, ${user.nome}`;

            if(['professor', 'direcao'].includes(user.role)) {
                document.getElementById('prof-mural').style.display = 'block';
                document.getElementById('prof-hw').style.display = 'block';
            }
            if(user.role === 'direcao') document.getElementById('btn-direcao').style.display = 'block';
            
            switchView('home');
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if(id === 'homeworks') loadHWs();
            if(id === 'forum') loadForum();
        }

        async function loadHWs() {
            const data = await (await fetch('/api/homeworks')).json();
            document.getElementById('hw-list').innerHTML = data.map(h => `
                <div class="glass-card hw-card">
                    <small style="color:#ffcc00">${h.materia}</small>
                    <h4>${h.titulo}</h4>
                    <p style="color:#888; margin:10px 0;">${h.descricao}</p>
                    <small>Entrega: ${new Date(h.dataEntrega).toLocaleDateString()}</small>
                </div>
            `).join('');
        }

        function logout() { localStorage.clear(); location.reload(); }

        // Persistent Session Check
        window.onload = () => {
            const saved = localStorage.getItem('v-user');
            if(saved) initApp(JSON.parse(saved));
        };
    </script>
</body>
</html>
