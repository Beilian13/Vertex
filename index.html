<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex | Login</title>
    <style>
        :root { --primary: #007BFF; --bg: #000; --card: #121212; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .header { border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 30px; }
        .auth-box { background: var(--card); padding: 20px; border-radius: 12px; max-width: 350px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        input { background: #222; color: #fff; }
        button { background: var(--primary); color: #fff; font-weight: bold; cursor: pointer; }
        .admin-only { display: none; border: 1px dashed var(--primary); padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="login-screen" class="auth-box">
        <h2>Vertex Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="main-screen" style="display:none;">
        <div class="header">
            <h1 id="welcome">Bem-vindo</h1>
            <p id="role-tag" style="color: var(--primary); font-weight: bold;"></p>
        </div>

        <div id="admin-panel" class="admin-only">
            <h3>Painel de Direção</h3>
            <input type="text" id="targetEmail" placeholder="Email do Aluno">
            <select id="newRole">
                <option value="representante">Representante</option>
                <option value="professor">Professor</option>
                <option value="direcao">Direção</option>
            </select>
            <button onclick="updateRole()">Mudar Cargo</button>
        </div>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('pass').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, senha })
            });
            const data = await res.json();
            if(data.token) {
                localStorage.setItem('v-token', data.token);
                showDashboard(data);
            }
        }

        function showDashboard(user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('welcome').innerText = `Olá, ${user.nome}`;
            document.getElementById('role-tag').innerText = `Cargo: ${user.role}`;
            
            if(user.role === 'admin' || user.role === 'direcao') {
                document.getElementById('admin-panel').style.display = 'block';
            }
        }

        async function updateRole() {
            const targetEmail = document.getElementById('targetEmail').value;
            const newRole = document.getElementById('newRole').value;
            const token = localStorage.getItem('v-token');
            const res = await fetch('/api/admin/update-role', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ targetEmail, newRole, token })
            });
            alert(await res.text());
        }
    </script>
</body>
</html>
