<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex | Scholar Management</title>
    <style>
        :root {
            /* Vertex Default Palette */
            --primary-color: #007BFF; /* Azul Neutro */
            --bg-color: #000000;      /* Preto Absoluto */
            --card-bg: #121212;       /* Preto Diferenciado */
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header {
            border-left: 4px solid var(--primary-color); /* Fio de Luz */
            padding-left: 15px;
            margin-bottom: 30px;
        }

        .task-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); /* Estilo Shadow */
            border-right: 2px solid transparent;
            transition: 0.3s;
        }

        .task-card:hover {
            border-right: 2px solid var(--primary-color); /* Feedback no Hover */
        }

        .materia-tag {
            color: var(--primary-color);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* O Atlas Arrastável (Placeholder Visual) */
        #atlas-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--primary-color);
            border-radius: 50%;
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Vertex</h1>
        <p>Tarefas de Casa | 8º Ano A</p>
    </div>

    <div id="task-list">
        <div class="task-card">
            <span class="materia-tag">História</span>
            <h3>Revolução Industrial</h3>
            <p>Ler o texto da página 42 e resumir os pontos principais para a P1.</p>
            <small>Entrega: 05/04/2026</small>
        </div>
    </div>

    <div id="atlas-btn">
        <span style="font-size: 24px;">💎</span>
    </div>

    <script>
        // Lógica simples para carregar tarefas (Exemplo)
        async function loadTasks() {
            try {
                const response = await fetch('http://localhost:3000/api/tasks/8A');
                const data = await response.json();
                console.log("Tarefas carregadas:", data);
            } catch (err) {
                console.log("Servidor offline, rodando modo demo.");
            }
        }
        loadTasks();
    </script>
</body>
</html>
