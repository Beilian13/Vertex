<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex | Professional Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #02040a; 
            --surface: rgba(20, 25, 35, 0.7); 
            --primary-grad: linear-gradient(135deg, #0055ff 0%, #7a00ff 100%);
            --accent: #0084ff; 
            --danger: #ff3366;
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff; 
            --text-dim: #94a3b8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding-bottom: 90px; 
            background-image: radial-gradient(circle at 50% -20%, #1a2a4a 0%, #02040a 60%);
            min-height: 100vh;
        }

        .glass { background: var(--surface); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; }
        .btn { 
            background: var(--primary-grad); color: white; border: none; padding: 16px; border-radius: 14px; 
            font-weight: 700; width: 100%; transition: 0.3s; box-shadow: 0 8px 25px rgba(0, 85, 255, 0.2);
        }
        .btn:active { transform: scale(0.96); }

        input, textarea, select { 
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border); color: #fff; 
            padding: 16px; border-radius: 14px; width: 100%; margin-bottom: 12px; font-size: 15px;
        }

        nav { 
            position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(10, 15, 25, 0.9); 
            backdrop-filter: blur(20px); display: flex; justify-content: space-around; 
            padding: 12px; border-radius: 25px; border: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { color: var(--text-dim); font-size: 9px; font-weight: 700; text-align: center; text-transform: uppercase; cursor: pointer;}
        .nav-item.active { color: #fff; text-shadow: 0 0 10px var(--accent); }

        .view { display: none; padding: 20px; animation: slideIn 0.3s ease-out; }
        .view.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card { padding: 20px; margin-bottom: 15px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-bottom: 10px; }
        .badge-oc { background: var(--danger); }
        .badge-at { background: var(--accent); }

        #auth-page { height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 30px; }
        .logo-text { font-size: 40px; font-weight: 800; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="logo-text">VERTEX</div>
        <div class="glass card" style="margin-top:40px;">
            <input type="email" id="email" placeholder="Email Institucional">
            <input type="password" id="senha" placeholder="Senha">
            <button class="btn" onclick="handleAuth()">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="app-shell" style="display:none;">
        <header style="padding: 25px 20px; display: flex; justify-content: space-between; align-items: center;">
            <div style="display:flex; align-items:center; gap:12px;">
                <img id="user-avatar" style="width:45px; height:45px; border-radius:14px; border:1.5px solid var(--accent);">
                <div>
                    <div id="user-name-label" style="font-weight:700; font-size:16px;"></div>
                    <div id="user-role-label" style="font-size:10px; color:var(--text-dim); text-transform: uppercase;"></div>
                </div>
            </div>
        </header>

        <div id="view-home" class="view active">
            <h3 style="margin-bottom:20px;">Últimas Notícias</h3>
            <div id="prof-news-area" style="display:none;">
                <input type="text" id="n-tit" placeholder="Título da notícia...">
                <button class="btn" onclick="postNoticia()" style="margin-bottom:20px;">Publicar Notícia</button>
            </div>
            <div id="noticias-list"></div>
        </div>

        <div id="view-atividades" class="view">
            <h3 style="margin-bottom:20px;">Atividades & Tarefas</h3>
            <div id="prof-at-area" style="display:none;">
                <div class="glass card">
                    <input type="text" id="at-mat" placeholder="Matéria">
                    <input type="text" id="at-tit" placeholder="Título">
                    <input type="date" id="at-date">
                    <button class="btn" onclick="postAtividade()">Lançar para Turma</button>
                </div>
            </div>
            <div id="atividades-list"></div>
        </div>

        <div id="view-ocorrencias" class="view">
            <h3 style="margin-bottom:20px;">Sistema Disciplinar</h3>
            <div id="prof-oc-area" style="display:none;">
                <div class="glass card">
                    <input type="text" id="oc-aluno" placeholder="Nome do Aluno">
                    <select id="oc-tipo">
                        <option value="Leve">Leve</option>
                        <option value="Media">Média</option>
                        <option value="Grave">Grave</option>
                        <option value="Advertencia">ADVERTÊNCIA</option>
                    </select>
                    <textarea id="oc-desc" placeholder="Relato detalhado do incidente..."></textarea>
                    <button class="btn" onclick="postOcorrencia()" style="background:var(--danger)">Registrar Ocorrência</button>
                </div>
            </div>
            <div id="ocorrencias-list"></div>
        </div>

        <div id="view-forum" class="view">
            <h3>Fórum da Turma</h3>
            <div id="forum-list-view">
                <div class="glass card">
                    <input type="text" id="f-tit" placeholder="Título da discussão">
                    <textarea id="f-con" placeholder="Conteúdo..."></textarea>
                    <button class="btn" onclick="postThread()">Abrir Discussão</button>
                </div>
                <div id="forum-container"></div>
            </div>
        </div>

        <nav>
            <div class="nav-item active" onclick="switchView('home')">Notícias</div>
            <div class="nav-item" onclick="switchView('atividades')">Atividades</div>
            <div class="nav-item" onclick="switchView('ocorrencias')">Ocorrências</div>
            <div class="nav-item" onclick="switchView('forum')">Fórum</div>
            <div class="nav-item" onclick="logout()" style="color:#ff4444;">Sair</div>
        </nav>
    </div>

    <script>
        let isLogin = true, userData = null;

        const api = async (url, method = 'GET', body = null) => {
            const token = localStorage.getItem('v-token');
            const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': token || '' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            if (!res.ok) return null;
            return await res.json();
        };

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            
            if (id === 'home') loadNoticias();
            if (id === 'atividades') loadAtividades();
            if (id === 'ocorrencias') loadOcorrencias();
            if (id === 'forum') loadForum();
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('v-token', data.token);
                localStorage.setItem('v-user', JSON.stringify(data));
                initApp(data);
            } else alert(data.msg);
        }

        function initApp(u) {
            userData = u;
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('app-shell').style.display = 'block';
            document.getElementById('user-avatar').src = u.avatar;
            document.getElementById('user-name-label').innerText = u.nome;
            document.getElementById('user-role-label').innerText = u.role;

            if (u.role !== 'aluno') {
                document.getElementById('prof-news-area').style.display = 'block';
                document.getElementById('prof-at-area').style.display = 'block';
                document.getElementById('prof-oc-area').style.display = 'block';
            }
            switchView('home');
        }

        async function loadNoticias() {
            const data = await api('/api/noticias');
            if (data) document.getElementById('noticias-list').innerHTML = data.map(n => `
                <div class="glass card">
                    <div style="font-weight:700;">${n.titulo}</div>
                    <div style="font-size:11px; color:var(--text-dim); margin-top:5px;">Por ${n.autor}</div>
                </div>`).join('');
        }

        async function postNoticia() {
            const tit = document.getElementById('n-tit').value;
            if (await api('/api/noticias', 'POST', { titulo: tit })) {
                document.getElementById('n-tit').value = '';
                loadNoticias();
            }
        }

        async function loadAtividades() {
            const data = await api('/api/atividades');
            if (data) document.getElementById('atividades-list').innerHTML = data.map(a => `
                <div class="glass card" style="border-left:4px solid var(--accent);">
                    <div class="badge badge-at">${a.materia}</div>
                    <div style="font-weight:700;">${a.titulo}</div>
                    <div style="font-size:11px; margin-top:10px;">Entrega: ${new Date(a.dataEntrega).toLocaleDateString()}</div>
                </div>`).join('');
        }

        async function loadOcorrencias() {
            const data = await api('/api/ocorrencias');
            if (data) document.getElementById('ocorrencias-list').innerHTML = data.map(o => `
                <div class="glass card" style="border-left:4px solid ${o.tipo === 'Advertencia' ? '#ff0000' : '#ffaa00'}">
                    <div class="badge badge-oc" style="background:${o.tipo === 'Advertencia' ? '#ff0000' : ''}">${o.tipo}</div>
                    <div style="font-weight:700;">${o.alunoNome}</div>
                    <div style="font-size:13px; margin:10px 0; opacity:0.8;">${o.descricao}</div>
                    <div style="font-size:10px; color:var(--text-dim);">Relatado por ${o.autor} • Status: ${o.status}</div>
                </div>`).join('');
        }

        async function postOcorrencia() {
            const body = {
                alunoNome: document.getElementById('oc-aluno').value,
                tipo: document.getElementById('oc-tipo').value,
                descricao: document.getElementById('oc-desc').value,
                turma: userData.turma
            };
            if (await api('/api/ocorrencias', 'POST', body)) {
                alert("Ocorrência registrada!");
                loadOcorrencias();
            }
        }

        async function loadForum() {
            const data = await api('/api/forum');
            if (data) document.getElementById('forum-container').innerHTML = data.map(t => `
                <div class="glass card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:600;">${t.titulo}</div>
                        <div style="font-size:11px; color:var(--text-dim);">Autor: ${t.autor}</div>
                    </div>
                    <button onclick="reportBullying('${t._id}')" style="background:none; border:1px solid #ff3366; color:#ff3366; padding:5px 10px; border-radius:8px; font-size:10px;">REPORTAR</button>
                </div>`).join('');
        }

        async function reportBullying(id) {
            if (confirm("Deseja reportar este conteúdo por Bullying? A Direção será notificada.")) {
                await api(`/api/forum/report/${id}`, 'POST');
                alert("Reporte enviado. O sistema gerou uma ocorrência automática para análise.");
                loadForum();
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        window.onload = () => { const u = localStorage.getItem('v-user'); if (u) initApp(JSON.parse(u)); };
    </script>
</body>
</html>
