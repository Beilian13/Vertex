<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex | Sistema de Gestão Escolar</title>
    <style>
        :root { --primary: #007BFF; --bg: #050505; --card: #111; --text: #eee; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .container { width: 100%; max-width: 500px; padding: 20px; }
        .box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h2 { border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px; color: #fff; }
        button { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.8; }

        .task-card { background: #181818; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--primary); }
        .badge { background: rgba(0,123,255,0.2); color: var(--primary); padding: 3px 8px; border-radius: 5px; font-size: 0.7rem; text-transform: uppercase; }
        
        #main-screen { display: none; width: 100%; max-width: 700px; }
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background: #ff4444; width: auto; padding: 5px 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container" id="auth-container">
        <div id="reg-box" class="box">
            <h2>Criar Conta</h2>
            <input type="text" id="reg-nome" placeholder="Nome Completo">
            <input type="email" id="reg-email" placeholder="E-mail">
            <input type="password" id="reg-pass" placeholder="Senha">
            <input type="text" id="reg-turma" placeholder="Turma (Ex: 8A)">
            <button onclick="auth('register')">Registrar</button>
            <p style="text-align:center; margin-top:15px; font-size:0.8rem; cursor:pointer" onclick="toggle()">Já tem conta? Login</p>
        </div>

        <div id="log-box" class="box" style="display:none">
            <h2>Entrar no Vertex</h2>
            <input type="email" id="log-email" placeholder="E-mail">
            <input type="password" id="log-pass" placeholder="Senha">
            <button onclick="auth('login')">Entrar</button>
            <p style="text-align:center; margin-top:15px; font-size:0.8rem; cursor:pointer" onclick="toggle()">Não tem conta? Cadastro</p>
        </div>
    </div>

    <div id="main-screen">
        <div class="nav">
            <div>
                <h1 id="user-name">Olá</h1>
                <span id="user-role" class="badge">Aluno</span>
            </div>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>

        <div id="professor-panel" class="box" style="display:none; margin-bottom: 20px;">
            <h3>Postar Atividade</h3>
            <input type="text" id="task-materia" placeholder="Matéria">
            <input type="text" id="task-titulo" placeholder="Título da Atividade">
            <input type="date" id="task-date">
            <button onclick="postTask()" style="background: #28a745;">Publicar</button>
        </div>

        <div id="admin-panel" class="box" style="display:none; margin-bottom: 20px; border: 1px solid gold;">
            <h3>Gestão de Cargos</h3>
            <input type="text" id="admin-target" placeholder="E-mail do usuário">
            <select id="admin-role">
                <option value="representante">Representante</option>
                <option value="professor">Professor</option>
                <option value="direcao">Direção</option>
            </select>
            <button onclick="updateRole()">Alterar Cargo</button>
        </div>

        <div class="box">
            <h3>Atividades da Semana</h3>
            <div id="task-list"></div>
        </div>
    </div>

    <script>
        // PERSISTÊNCIA: Ao carregar a página, vê se já está logado
        window.onload = () => {
            const user = localStorage.getItem('v-user');
            if(user) showDashboard(JSON.parse(user));
        };

        function toggle() {
            document.getElementById('reg-box').style.display = document.getElementById('reg-box').style.display === 'none' ? 'block' : 'none';
            document.getElementById('log-box').style.display = document.getElementById('log-box').style.display === 'none' ? 'block' : 'none';
        }

        async function auth(type) {
            const isReg = type === 'register';
            const data = isReg ? {
                nome: document.getElementById('reg-nome').value,
                email: document.getElementById('reg-email').value,
                senha: document.getElementById('reg-pass').value,
                turma: document.getElementById('reg-turma').value
            } : {
                email: document.getElementById('log-email').value,
                senha: document.getElementById('log-pass').value
            };

            const res = await fetch(isReg ? '/api/auth/register' : '/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if(res.ok) {
                if(isReg) { alert("Registrado! Agora faça login."); toggle(); }
                else {
                    const user = await res.json();
                    localStorage.setItem('v-user', JSON.stringify(user));
                    localStorage.setItem('v-token', user.token);
                    showDashboard(user);
                }
            } else { alert("Erro na operação."); }
        }

        function showDashboard(user) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('user-name').innerText = `Olá, ${user.nome}`;
            document.getElementById('user-role').innerText = user.role;

            if(['admin', 'direcao', 'professor'].includes(user.role)) {
                document.getElementById('professor-panel').style.display = 'block';
            }
            if(user.role === 'admin' || user.role === 'direcao') {
                document.getElementById('admin-panel').style.display = 'block';
            }
            loadTasks();
        }

        async function loadTasks() {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.length ? '' : '<p>Sem tarefas.</p>';
            tasks.forEach(t => {
                list.innerHTML += `<div class="task-card">
                    <strong>${t.materia}</strong>: ${t.titulo}<br>
                    <small style="color:#888">Entrega: ${t.dataEntrega} | Por: ${t.autor}</small>
                </div>`;
            });
        }

        async function postTask() {
            const payload = {
                materia: document.getElementById('task-materia').value,
                titulo: document.getElementById('task-titulo').value,
                dataEntrega: document.getElementById('task-date').value,
                token: localStorage.getItem('v-token')
            };
            await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            loadTasks();
        }

        async function updateRole() {
            const payload = {
                targetEmail: document.getElementById('admin-target').value,
                newRole: document.getElementById('admin-role').value,
                token: localStorage.getItem('v-token')
            };
            const res = await fetch('/api/admin/update-role', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            alert(await res.text());
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
