<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vertex | Full Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --accent: #00d2ff; --bg: #030303; --card: rgba(20, 20, 20, 0.7); --border: rgba(255, 255, 255, 0.1); --text: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% -20%, #112244 0%, transparent 50%); min-height: 100vh; }
        .glass { background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        
        /* SIDEBAR */
        #sidebar { width: 280px; height: 95vh; margin: 2.5vh; position: fixed; display: none; flex-direction: column; padding: 30px; }
        .nav-link { padding: 15px; margin: 5px 0; border-radius: 12px; cursor: pointer; color: #888; transition: 0.3s; }
        .nav-link.active { background: rgba(0, 210, 255, 0.1); color: var(--accent); font-weight: bold; }
        
        main { margin-left: 320px; padding: 40px; display: none; }
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* INPUTS & BUTTONS */
        input, textarea, select { width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; }
        .btn-prime { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .homework-card { border-left: 4px solid #ffcc00; }
        .branch { border-left: 2px solid #333; margin-left: 20px; padding-left: 15px; margin-top: 10px; }
    </style>
</head>
<body>

    <nav id="sidebar" class="glass">
        <h2 style="font-family:'Poppins'; color:var(--accent); margin-bottom:40px;">VERTEX</h2>
        <div class="nav-link active" onclick="switchView('home')">🏠 Mural</div>
        <div class="nav-link" onclick="switchView('homeworks')">📚 Lição de Casa</div>
        <div class="nav-link" onclick="switchView('grades')">📊 Boletim PDF</div>
        <div class="nav-link" onclick="switchView('forum')">💬 Fórum</div>
        <div class="nav-link" onclick="logout()" style="margin-top:auto; color:#ff4b4b">🚪 Sair</div>
    </nav>

    <main id="main-screen">
        <h2 id="welcome-msg" style="margin-bottom:30px; font-family:'Poppins';">Dashboard</h2>

        <section id="view-home" class="view active">
            <div id="admin-task-panel" class="glass" style="display:none; border-color: var(--accent);">
                <h3>Postar Comunicado/Atividade</h3>
                <input type="text" id="t-tit" placeholder="Título">
                <input type="text" id="t-mat" placeholder="Matéria">
                <button class="btn-prime" onclick="postTask()">Postar no Mural</button>
            </div>
            <div id="task-list"></div>
        </section>

        <section id="view-homeworks" class="view">
            <div id="admin-hw-panel" class="glass" style="display:none; border-color: #ffcc00;">
                <h3>Nova Lição de Casa</h3>
                <input type="text" id="h-tit" placeholder="Título da Lição">
                <input type="text" id="h-mat" placeholder="Matéria">
                <textarea id="h-desc" placeholder="Instruções da lição..."></textarea>
                <input type="date" id="h-date">
                <button class="btn-prime" style="background:#ffcc00" onclick="postHomework()">Publicar Lição</button>
            </div>
            <div id="homework-list"></div>
        </section>

        <section id="view-grades" class="view">
            <div id="pdf-area" class="glass">
                <h2>Relatório Oficial</h2>
                <table style="width:100%; margin-top:20px;" id="grade-table"></table>
            </div>
            <button class="btn-prime" onclick="exportPDF()">Exportar PDF</button>
        </section>

        <section id="view-forum" class="view">
            <div id="forum-list"></div>
        </section>
    </main>

    <script>
        const token = () => localStorage.getItem('v-token');

        function showDashboard(user) {
            document.body.classList.add('logged-in');
            document.getElementById('sidebar').style.display = 'flex';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('welcome-msg').innerText = `Olá, ${user.nome}`;

            // ROLE CHECK: If admin/professor, show panels
            if(['admin', 'professor'].includes(user.role)) {
                document.getElementById('admin-task-panel').style.display = 'block';
                document.getElementById('admin-hw-panel').style.display = 'block';
            }
            loadTasks();
            loadHomeworks();
        }

        async function postHomework() {
            const body = {
                titulo: document.getElementById('h-tit').value,
                materia: document.getElementById('h-mat').value,
                descricao: document.getElementById('h-desc').value,
                dataEntrega: document.getElementById('h-date').value,
                token: token()
            };
            const res = await fetch('/api/homeworks', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
            if(res.ok) loadHomeworks();
        }

        async function loadHomeworks() {
            const hws = await (await fetch('/api/homeworks')).json();
            document.getElementById('homework-list').innerHTML = hws.map(h => `
                <div class="glass homework-card">
                    <span style="color:#ffcc00; font-weight:bold;">${h.materia}</span>
                    <h4>${h.titulo}</h4>
                    <p style="margin:10px 0; color:#aaa;">${h.descricao}</p>
                    <small>Entrega: ${new Date(h.dataEntrega).toLocaleDateString()}</small>
                </div>
            `).join('');
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if(id === 'homeworks') loadHomeworks();
        }

        // [Add Auth Login logic to call showDashboard(data)]
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
