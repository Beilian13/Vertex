<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertex | Management System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --accent: #00ff88; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: var(--card); border: 1px solid #222; border-radius: 12px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .view { display: none; padding: 20px; }
        .view.active { display: block; }
        input, textarea, select { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; width: 100%; margin-bottom: 10px; }
        nav { display: flex; gap: 15px; padding: 20px; border-bottom: 1px solid #222; overflow-x: auto; }
        .nav-item { cursor: pointer; opacity: 0.6; white-space: nowrap; }
        .nav-item.active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

    <div id="auth-page" style="display:flex; height:100vh; align-items:center; justify-content:center;">
        <div class="glass" style="width:350px; padding:30px;">
            <h2 style="color:var(--accent); text-align:center;">VERTEX</h2>
            <div id="reg-fields" style="display:none;">
                <input type="text" id="reg-nome" placeholder="Nome Completo">
                <input type="text" id="reg-turma" placeholder="Turma (ex: 801)">
            </div>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="senha" placeholder="Senha">
            <button class="btn" id="auth-btn" onclick="handleAuth()" style="width:100%">Entrar</button>
            <p onclick="toggleAuth()" style="text-align:center; cursor:pointer; font-size:12px; margin-top:15px;">Criar nova conta / Fazer Login</p>
        </div>
    </div>

    <div id="app-shell" style="display:none;">
        <nav>
            <div class="nav-item active" onclick="switchView('home')">Mural</div>
            <div class="nav-item" onclick="switchView('homeworks')">Tarefas</div>
            <div class="nav-item" onclick="switchView('grades')">Boletim</div>
            <div class="nav-item" onclick="switchView('forum')">Fórum</div>
            <div class="nav-item" style="color: #ff4444;" onclick="logout()">Sair</div>
        </nav>

        <div id="view-home" class="view active">
            <div id="prof-post-area" style="display:none; margin-bottom:20px;">
                <input type="text" id="m-tit" placeholder="O que deseja avisar no Mural?">
                <button class="btn" onclick="postToMural()">Publicar</button>
            </div>
            <h3>Mural da Turma</h3>
            <div id="mural-list"></div>
        </div>

        <div id="view-homeworks" class="view">
            <button class="btn" id="btn-new-hw" style="display:none; margin-bottom:15px;" onclick="toggleHwForm()">+ Nova Tarefa</button>
            <div id="hw-form" class="glass" style="display:none; padding:20px; margin-bottom:20px;">
                <input type="text" id="h-mat" placeholder="Matéria">
                <input type="text" id="h-tit" placeholder="Título">
                <textarea id="h-desc" placeholder="Descrição"></textarea>
                <input type="date" id="h-date">
                <button class="btn" onclick="postHomework()">Salvar Tarefa</button>
            </div>
            <h3>Tarefas Pendentes</h3>
            <div id="hw-list"></div>
        </div>

        <div id="view-grades" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Meu Desempenho</h3>
                <button class="btn" onclick="generatePDF()" style="background:#444; color:#fff;">Baixar PDF</button>
            </div>
            <div class="glass" style="overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse; text-align:left;">
                    <thead><tr style="border-bottom:1px solid #333;"><th style="padding:15px;">Matéria</th><th>AV1</th><th>AV2</th><th>Média</th></tr></thead>
                    <tbody id="grades-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="view-forum" class="view">
            <div id="forum-list-view">
                <input type="text" id="f-tit" placeholder="Título do Tópico">
                <textarea id="f-con" placeholder="Conteúdo da discussão..."></textarea>
                <button class="btn" onclick="postThread()">Abrir Discussão</button>
                <hr style="border:1px solid #222; margin:20px 0;">
                <div id="forum-container"></div>
            </div>
            <div id="thread-view" style="display:none;">
                <button onclick="closeThread()" style="background:none; border:none; color:var(--accent); cursor:pointer;">← Voltar</button>
                <div id="thread-content" style="margin:20px 0;"></div>
                <div id="comment-tree"></div>
                <textarea id="main-reply" placeholder="Escreva uma resposta..." style="margin-top:20px;"></textarea>
                <button class="btn" onclick="postReply(null)">Comentar</button>
            </div>
        </div>
    </div>

    <script>
        let isLogin = true, currentThread = null;

        const api = async (url, method = 'GET', body = null) => {
            const token = localStorage.getItem('v-token');
            const opts = { 
                method, 
                headers: { 'Content-Type': 'application/json', 'Authorization': token || '' } 
            };
            if (body) opts.body = JSON.stringify(body);
            try {
                const res = await fetch(url, opts);
                if (res.status === 403) { alert("Erro 403: Permissão insuficiente."); return null; }
                if (!res.ok) throw new Error("API Fail");
                return await res.json();
            } catch (e) { console.error(e); return null; }
        };

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            
            if (id === 'home') loadMural();
            if (id === 'homeworks') loadHWs();
            if (id === 'forum') loadForum();
            if (id === 'grades') loadGrades();
        }

        function toggleAuth() { 
            isLogin = !isLogin; 
            document.getElementById('reg-fields').style.display = isLogin ? 'none' : 'block'; 
            document.getElementById('auth-btn').innerText = isLogin ? 'Entrar' : 'Registrar';
        }

        async function handleAuth() {
            const body = { 
                email: document.getElementById('email').value, 
                senha: document.getElementById('senha').value,
                nome: document.getElementById('reg-nome').value,
                turma: document.getElementById('reg-turma').value
            };
            const res = await fetch(isLogin ? '/api/auth/login' : '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (res.ok) {
                if (isLogin) {
                    localStorage.setItem('v-token', data.token);
                    localStorage.setItem('v-user', JSON.stringify(data));
                    initApp(data);
                } else { alert("Registrado! Agora entre."); toggleAuth(); }
            } else alert(data.msg);
        }

        function initApp(u) {
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('app-shell').style.display = 'block';
            if (u.role !== 'aluno') {
                document.getElementById('prof-post-area').style.display = 'block';
                document.getElementById('btn-new-hw').style.display = 'block';
            }
            switchView('home');
        }

        async function loadMural() {
            const data = await api('/api/mural');
            if (data) document.getElementById('mural-list').innerHTML = data.map(p => `
                <div class="glass" style="padding:15px; margin-bottom:10px;">
                    <h4>${p.titulo}</h4><small>Postado por ${p.autor}</small>
                </div>`).join('');
        }

        async function postToMural() {
            const tit = document.getElementById('m-tit').value;
            if (await api('/api/mural', 'POST', { titulo: tit })) {
                document.getElementById('m-tit').value = '';
                loadMural();
            }
        }

        function toggleHwForm() {
            const f = document.getElementById('hw-form');
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
        }

        async function loadHWs() {
            const data = await api('/api/homeworks');
            if (data) document.getElementById('hw-list').innerHTML = data.map(h => `
                <div class="glass" style="padding:15px; margin-bottom:10px; border-left:4px solid var(--accent);">
                    <b>${h.materia}</b>: ${h.titulo}<br><small>Até ${new Date(h.dataEntrega).toLocaleDateString()}</small>
                </div>`).join('');
        }

        async function postHomework() {
            const body = { 
                materia: document.getElementById('h-mat').value, 
                titulo: document.getElementById('h-tit').value,
                descricao: document.getElementById('h-desc').value,
                dataEntrega: document.getElementById('h-date').value
            };
            if (await api('/api/homeworks', 'POST', body)) { toggleHwForm(); loadHWs(); }
        }

        async function loadGrades() {
            const grades = await api('/api/me/grades');
            if (grades) document.getElementById('grades-table-body').innerHTML = grades.map(g => `
                <tr style="border-bottom:1px solid #222;">
                    <td style="padding:15px;">${g.materia}</td><td>${g.av1}</td><td>${g.av2}</td>
                    <td style="color:var(--accent)"><b>${((g.av1+g.av2)/2).toFixed(1)}</b></td>
                </tr>`).join('');
        }

        function generatePDF() { html2pdf().from(document.getElementById('view-grades')).save('Boletim.pdf'); }

        async function loadForum() {
            const data = await api('/api/forum');
            if (data) document.getElementById('forum-container').innerHTML = data.map(t => `
                <div class="glass" style="padding:15px; margin-bottom:10px; cursor:pointer;" onclick="openThread('${t._id}')">
                    ${t.titulo} <br><small>Por ${t.autor}</small>
                </div>`).join('');
        }

        async function postThread() {
            const body = { titulo: document.getElementById('f-tit').value, conteudo: document.getElementById('f-con').value };
            if (await api('/api/forum', 'POST', body)) {
                document.getElementById('f-tit').value = '';
                document.getElementById('f-con').value = '';
                loadForum();
            }
        }

        async function openThread(id) {
            const t = await api(`/api/forum/${id}`);
            if (!t) return;
            currentThread = t;
            document.getElementById('forum-list-view').style.display = 'none';
            document.getElementById('thread-view').style.display = 'block';
            document.getElementById('thread-content').innerHTML = `<h3>${t.titulo}</h3><p>${t.conteudo}</p>`;
            renderComments(t.replies);
        }

        function renderComments(replies, parentId = null) {
            const container = parentId === null ? document.getElementById('comment-tree') : document.getElementById(`replies-${parentId}`);
            if (!container) return;
            if (parentId === null) container.innerHTML = '';
            replies.filter(r => r.parentId === (parentId ? parentId.toString() : null)).forEach(r => {
                const div = document.createElement('div');
                div.className = parentId === null ? 'glass' : '';
                div.style.padding = '10px'; div.style.marginTop = '10px';
                div.innerHTML = `<small style="color:var(--accent)">${r.autor}</small><p>${r.texto}</p><div id="replies-${r.id}" style="margin-left:20px; border-left:1px solid #333;"></div>`;
                container.appendChild(div);
                renderComments(replies, r.id);
            });
        }

        async function postReply(parentId) {
            const texto = document.getElementById('main-reply').value;
            if (await api('/api/forum/reply', 'POST', { threadId: currentThread._id, texto, parentId })) {
                document.getElementById('main-reply').value = '';
                openThread(currentThread._id);
            }
        }

        function closeThread() { document.getElementById('forum-list-view').style.display = 'block'; document.getElementById('thread-view').style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }

        window.onload = () => { 
            const u = localStorage.getItem('v-user'); 
            if (u) initApp(JSON.parse(u)); 
        };
    </script>
</body>
</html>
