<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vertex | Social & Academic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #007BFF; --bg: #050505; --card: #111; --text: #eee; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; }
        
        #sidebar { width: 260px; height: 100vh; background: #080808; border-right: 1px solid var(--border); position: fixed; padding: 20px; }
        .nav-item { padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; color: #888; }
        .nav-item.active { background: #151515; color: var(--primary); }

        main { margin-left: 260px; padding: 40px; width: 100%; }
        .view { display: none; }
        .view.active { display: block; }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        /* FORUM STYLES */
        .vote-btn { background: #222; border: 1px solid #333; color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .reply-box { margin-top: 15px; border-left: 2px solid var(--primary); padding-left: 15px; }
        .reply-input { background: #1a1a1a; border: 1px solid #333; color: #fff; width: 80%; padding: 5px; border-radius: 4px; }

        /* GRADE TABLE */
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        th { background: #1a1a1a; }
        .pdf-btn { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <h2 style="color:var(--primary); margin-bottom:30px;">VERTEX</h2>
        <div class="nav-item active" onclick="switchView('home')">🏠 Mural</div>
        <div class="nav-item" onclick="switchView('grades')">📊 Minhas Notas</div>
        <div class="nav-item" onclick="switchView('forum')">💬 Fórum</div>
        <div class="nav-item" style="margin-top:auto; color:#ff4444" onclick="logout()">Logout</div>
    </nav>

    <main id="main-screen">
        <section id="view-grades" class="view">
            <div id="grade-report">
                <h2 style="margin-bottom:10px;">Boletim Oficial</h2>
                <p id="student-info" style="color:#888; margin-bottom:20px;"></p>
                <table>
                    <thead><tr><th>Matéria</th><th>AV1</th><th>AV2</th><th>Média</th></tr></thead>
                    <tbody id="official-grades"></tbody>
                </table>
            </div>
            <button class="pdf-btn" onclick="downloadPDF()">⬇️ Baixar PDF do Boletim</button>
        </section>

        <section id="view-forum" class="view">
            <div class="card">
                <h3>Criar Novo Tópico</h3>
                <input type="text" id="f-title" placeholder="Título do debate">
                <textarea id="f-content" style="width:100%; height:60px; background:#1a1a1a; color:#fff; border:1px solid #333; margin:10px 0; padding:10px; border-radius:8px;"></textarea>
                <button onclick="postThread()">Publicar</button>
            </div>
            <div id="forum-container"></div>
        </section>

        <section id="view-home" class="view active">
            <h1>Mural da Turma</h1>
            <div id="task-list"></div>
        </section>
    </main>

    <script>
        const token = localStorage.getItem('v-token');

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if(id === 'grades') loadOfficialGrades();
            if(id === 'forum') loadForum();
        }

        // --- GRADES & PDF ---
        async function loadOfficialGrades() {
            const res = await fetch('/api/my-grades', { headers: {'Authorization': token} });
            const grades = await res.json();
            const user = JSON.parse(localStorage.getItem('v-user'));
            document.getElementById('student-info').innerText = `${user.nome} | Turma: ${user.turma}`;
            
            const body = document.getElementById('official-grades');
            body.innerHTML = grades.map(g => `
                <tr>
                    <td>${g.materia}</td>
                    <td>${g.av1}</td>
                    <td>${g.av2}</td>
                    <td style="color:gold; font-weight:bold">${((g.av1 + g.av2)/2).toFixed(1)}</td>
                </tr>
            `).join('');
        }

        function downloadPDF() {
            const element = document.getElementById('grade-report');
            const opt = { margin: 1, filename: 'Boletim_Vertex.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
            html2pdf().set(opt).from(element).save();
        }

        // --- FORUM & SOCIAL ---
        async function loadForum() {
            const res = await fetch('/api/forum');
            const threads = await res.json();
            const container = document.getElementById('forum-container');
            container.innerHTML = threads.map(t => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between">
                        <h4>${t.titulo}</h4>
                        <button class="vote-btn" onclick="vote('${t._id}')">🔼 ${t.upvotes.length}</button>
                    </div>
                    <p style="margin:10px 0; color:#ccc">${t.conteudo}</p>
                    <small style="color:var(--primary)">Postado por: ${t.autor}</small>
                    
                    <div class="replies" id="replies-${t._id}">
                        ${t.replies.map(r => `<div class="reply-box"><small><b>${r.autor}:</b> ${r.texto}</small></div>`).join('')}
                    </div>
                    
                    <div style="margin-top:10px;">
                        <input type="text" id="input-${t._id}" class="reply-input" placeholder="Escreva um comentário...">
                        <button onclick="reply('${t._id}')">Enviar</button>
                    </div>
                </div>
            `).join('');
        }

        async function vote(threadId) {
            await fetch('/api/forum/vote', { 
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ threadId, token }) 
            });
            loadForum();
        }

        async function reply(threadId) {
            const texto = document.getElementById(`input-${threadId}`).value;
            await fetch('/api/forum/reply', { 
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ threadId, texto, token }) 
            });
            loadForum();
        }

        async function postThread() {
            const titulo = document.getElementById('f-title').value;
            const conteudo = document.getElementById('f-content').value;
            await fetch('/api/forum', { 
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ titulo, conteudo, token }) 
            });
            loadForum();
        }

        // --- AUTH & OTHER LOGIC ---
        // [Add your login/showDashboard logic here]
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
